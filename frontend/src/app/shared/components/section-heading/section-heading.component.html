<div class="max-w-2xl">
  @if (eyebrow()) {
    <span class="mb-3 inline-flex rounded-full bg-white/50 px-3 py-1 text-xs font-semibold uppercase tracking-[0.24em] text-ink/55">
      {{ eyebrow() }}
    </span>
  }
  <h2 class="text-3xl font-bold sm:text-4xl">{{ title() }}</h2>
  @if (description()) {
    <p class="mt-4 text-base sm:text-lg">{{ description() }}</p>
  }
</div>
