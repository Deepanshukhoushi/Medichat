<a class="inline-flex items-center gap-3 no-underline" routerLink="/">
  <span class="logo-shell p-1.5 flex items-center justify-center rounded-lg bg-accent/10">
    <svg [lucideIcon]="icons.HeartPulse" class="h-4 w-4 text-accent"></svg>
  </span>
  <span class="flex flex-col justify-center leading-tight">
    <span class="block font-display text-[15px] font-bold tracking-tight" [ngClass]="variant === 'light' ? 'text-white' : 'text-ink'">MediChat</span>
    <span class="block text-[9px] uppercase tracking-[0.15em]" [ngClass]="variant === 'light' ? 'text-white/50' : 'text-ink/45'">Medical AI</span>
  </span>
</a>
