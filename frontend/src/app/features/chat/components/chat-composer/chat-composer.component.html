<div class="flex w-full flex-col gap-1 max-w-4xl mx-auto" (focusin)="focusStateChange.emit(true)" (focusout)="handleFocusOut($event)">
  @if (uploadToast()) {
    <div class="rounded-xl border border-ink/10 bg-ink/5 px-4 py-2 text-center text-xs text-ink/70 transition-all" aria-live="polite" role="status">
      {{ uploadToast() }}
    </div>
  }

  <div class="flex items-end gap-2 rounded-[20px] bg-[#0D1117] border border-white/[0.08] p-2 pr-3 shadow-sm transition-all focus-within:ring-2 focus-within:ring-[#22C55E]/30 focus-within:shadow-[#22C55E]/10 min-h-[58px]">
    <input
      #fileInput
      type="file"
      class="hidden"
      accept=".pdf"
      (change)="onFileSelected($event)"
    />

    <button
      class="self-end mb-1 rounded-full p-2 text-ink/50 transition hover:bg-ink/5 disabled:opacity-40"
      type="button"
      aria-label="Attach PDF file"
      [disabled]="isUploading()"
      (click)="triggerFileUpload(fileInput)"
      title="Upload PDF document to knowledge base"
    >
      @if (isUploading()) {
        <svg class="h-5 w-5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 12a8 8 0 018-8V2.5" />
        </svg>
      } @else {
        <svg [lucideIcon]="icons.Paperclip" class="h-5 w-5"></svg>
      }
    </button>

    <textarea
      #composerTextarea
      class="max-h-32 min-h-12 w-full resize-none border-0 bg-transparent py-3 text-base text-ink outline-none placeholder-[#6B7280]"
      placeholder="Ask anything about medicine..."
      [ngModel]="prompt()"
      (ngModelChange)="prompt.set($event)"
      (keydown)="onKeyDown($event, composerTextarea)"
    ></textarea>

    @if (isStreaming()) {
      <button
        class="flex h-10 w-10 shrink-0 items-center justify-center self-end mb-1 rounded-full bg-ink/10 text-ink transition hover:bg-ink/20"
        type="button"
        (click)="stopped.emit()"
        aria-label="Stop generation"
        title="Stop generation"
      >
        <svg [lucideIcon]="icons.Square" class="h-4 w-4 fill-current"></svg>
      </button>
    } @else {
      <button
        class="flex h-10 w-10 shrink-0 items-center justify-center self-end mb-1 rounded-full bg-[#22C55E] text-white transition-all hover:bg-[#1ea951] hover:-translate-y-0.5 shadow-md shadow-[#22C55E]/20 disabled:opacity-50 disabled:hover:translate-y-0 disabled:shadow-none"
        type="button"
        (click)="send()"
        [disabled]="!prompt().trim()"
        aria-label="Send message"
        title="Send message"
      >
        <svg [lucideIcon]="icons.ArrowUp" class="h-5 w-5"></svg>
      </button>
    }
  </div>

  @if (isUploading()) {
    <div class="space-y-1">
      <div class="h-1.5 overflow-hidden rounded-full bg-ink/10" aria-hidden="true">
        <div class="h-full rounded-full bg-gradient-to-r from-accent to-success transition-all duration-200" [style.width.%]="uploadProgress()"></div>
      </div>
      <p class="px-1 text-[11px] text-ink/45" aria-live="polite">
        Uploading {{ uploadFileName() ?? 'document' }} {{ uploadProgress() }}%
      </p>
    </div>
  }

</div>
