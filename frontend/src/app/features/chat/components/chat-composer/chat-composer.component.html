<div class="flex w-full flex-col gap-2 relative z-10" (focusin)="focusStateChange.emit(true)" (focusout)="handleFocusOut($event)">
  
  @if (uploadToast()) {
    <div class="rounded-xl border border-ink/10 bg-ink/5 px-4 py-2 text-center text-xs text-ink/60 transition-all" aria-live="polite" role="status">
      {{ uploadToast() }}
    </div>
  }

  @if (voiceToast()) {
    <div class="rounded-xl border border-accent/15 bg-accent/[0.06] px-4 py-2 text-center text-xs text-accent/90 font-medium transition-all" aria-live="polite" role="status">
      🎤 Voice input is coming soon
    </div>
  }

  <!-- Main Composer -->
  <div class="flex flex-col rounded-[22px] bg-surface/30 border border-line/[0.1] transition-all duration-200 hover:border-line/[0.16] focus-within:border-line/[0.2] focus-within:ring-2 focus-within:ring-accent/[0.12] relative min-h-[60px] shadow-sm">
    
    <input
      #fileInput
      type="file"
      class="hidden"
      accept=".pdf,.png,.jpg,.jpeg"
      (change)="onFileSelected($event)"
    />

    <div class="flex items-end px-4 pb-[14px] pt-[14px] gap-2.5">
      <!-- Left action buttons -->
      <div class="flex items-center gap-1.5 shrink-0">
        <button
          class="flex h-8 w-8 items-center justify-center rounded-full text-ink/35 transition-all hover:bg-ink/[0.06] hover:text-ink/70 disabled:opacity-30"
          type="button"
          aria-label="Attach file"
          [disabled]="isUploading()"
          (click)="triggerFileUpload(fileInput)"
        >
          @if (isUploading()) {
            <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 12a8 8 0 018-8V2.5" />
            </svg>
          } @else {
            <svg [lucideIcon]="icons.Paperclip" class="h-[17px] w-[17px]"></svg>
          }
        </button>
        <button
          class="flex h-8 w-8 items-center justify-center rounded-full text-ink/35 transition-all hover:bg-ink/[0.06] hover:text-ink/70"
          type="button"
          aria-label="Voice input (coming soon)"
          (click)="showVoiceToast()"
        >
          <svg [lucideIcon]="icons.Mic" class="h-[17px] w-[17px]"></svg>
        </button>
      </div>

      <!-- Textarea -->
      <textarea
        #composerTextarea
        class="max-h-[200px] min-h-[32px] flex-1 resize-none border-0 bg-transparent py-1 text-[15px] font-normal leading-relaxed text-ink outline-none placeholder:text-ink/35 scrollbar-hide"
        placeholder="Ask anything about medicine..."
        [ngModel]="prompt()"
        (ngModelChange)="prompt.set($event)"
        (keydown)="onKeyDown($event, composerTextarea)"
      ></textarea>

      <!-- Send / Stop button -->
      <div class="flex items-center shrink-0">
        @if (isStreaming()) {
          <button
            class="flex h-8 w-8 items-center justify-center rounded-full bg-error/90 text-white transition hover:bg-error shadow-sm"
            (click)="stopped.emit()"
            aria-label="Stop generating"
            type="button"
          >
            <svg [lucideIcon]="icons.Square" class="h-3 w-3 fill-current"></svg>
          </button>
        } @else {
          <button
            class="flex h-8 w-8 items-center justify-center rounded-full bg-accent text-white transition-all duration-200 hover:bg-accent-hover hover:shadow-md disabled:opacity-35 disabled:bg-ink/10 disabled:text-ink/30 disabled:shadow-none shadow-sm"
            [disabled]="!prompt().trim() && !isUploading()"
            (click)="send()"
            aria-label="Send message"
            type="button"
          >
            <svg [lucideIcon]="icons.ArrowUp" class="h-[17px] w-[17px] stroke-[2.5]"></svg>
          </button>
        }
      </div>
    </div>
  </div>

  @if (isUploading()) {
    <div class="mt-1 px-1">
      <div class="h-[3px] overflow-hidden rounded-full bg-ink/[0.08]">
        <div class="h-full bg-accent rounded-full transition-all duration-200" [style.width.%]="uploadProgress()"></div>
      </div>
    </div>
  }
</div>
